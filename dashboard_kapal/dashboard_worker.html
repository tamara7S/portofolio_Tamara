<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PT PAL — OPERATOR STATION</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --navy:#0f172a;--navy2:#1e293b;--navy3:#334155;
  --blue:#3b82f6;--blue2:#60a5fa;
  --green:#22c55e;--amber:#f59e0b;--red:#ef4444;--teal:#06b6d4;
  --text:#f1f5f9;--text2:#94a3b8;--text3:#475569;
  --border:rgba(255,255,255,0.08);
  --card:rgba(255,255,255,0.03);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--navy);color:var(--text);font-family:'Plus Jakarta Sans',sans-serif;height:100vh;display:flex;overflow:hidden}

/* ── SIDEBAR ── */
aside{width:250px;min-height:100vh;background:var(--navy2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;position:relative}
.brand{padding:22px 20px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.brand-icon{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#3b82f6,#06b6d4);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.brand-name{font-size:14px;font-weight:700;color:var(--text)}
.brand-sub{font-size:10px;color:var(--text2);margin-top:1px}

nav{padding:16px 12px;flex:1}
.nav-section{font-size:9px;color:var(--text3);letter-spacing:2px;text-transform:uppercase;padding:4px 12px 8px;margin-top:8px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;color:var(--text2);font-size:13px;font-weight:500;cursor:pointer;transition:.2s;text-decoration:none;margin-bottom:2px}
.nav-item:hover{background:var(--card);color:var(--text)}
.nav-item.active{background:rgba(59,130,246,0.12);color:var(--blue2)}
.nav-item .icon{font-size:15px;width:20px;text-align:center}
.nav-badge{margin-left:auto;font-size:10px;font-weight:700;padding:2px 7px;border-radius:20px;background:rgba(239,68,68,0.15);color:var(--red)}

.profile{padding:14px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;background:linear-gradient(135deg,#3b82f6,#06b6d4);flex-shrink:0}
.p-name{font-size:12px;font-weight:600}
.p-role{font-size:10px;color:var(--text2);margin-top:1px}

/* ── MAIN ── */
main{flex:1;display:flex;flex-direction:column;overflow:hidden}

header{height:58px;background:var(--navy2);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 24px;flex-shrink:0}
.hdr-left h1{font-size:16px;font-weight:700}
.hdr-left p{font-size:11px;color:var(--text2);margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:12px}
.hdr-clock{font-family:'JetBrains Mono',monospace;font-size:13px;color:var(--text2);background:var(--navy);padding:6px 12px;border-radius:6px;border:1px solid var(--border)}
.live-pill{font-size:10px;font-weight:600;padding:5px 12px;border-radius:20px;background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.25);color:var(--green)}
.live-dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.btn-logout{background:var(--navy);border:1px solid var(--border);color:var(--text2);padding:7px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'Plus Jakarta Sans';transition:.2s}
.btn-logout:hover{border-color:var(--red);color:var(--red)}

/* ── CONTENT ── */
.content{flex:1;overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:16px}
.content::-webkit-scrollbar{width:4px}.content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* stat cards */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.stat-card{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:16px 18px;position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.sc-blue::before{background:var(--blue)}.sc-green::before{background:var(--green)}.sc-amber::before{background:var(--amber)}.sc-teal::before{background:var(--teal)}
.sc-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:10px}
.sc-val{font-size:24px;font-weight:700;line-height:1}
.sc-label{font-size:11px;color:var(--text2);margin-top:3px}
.sc-badge{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px;margin-top:8px}

/* cards */
.card{background:var(--navy2);border:1px solid var(--border);border-radius:12px;padding:18px}
.card-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.card-title{font-size:14px;font-weight:600}
.badge-sm{font-size:10px;font-weight:600;padding:3px 10px;border-radius:20px}
.b-blue{background:rgba(59,130,246,0.12);color:var(--blue2);border:1px solid rgba(59,130,246,0.2)}
.b-green{background:rgba(34,197,94,0.12);color:var(--green);border:1px solid rgba(34,197,94,0.2)}
.b-amber{background:rgba(245,158,11,0.12);color:var(--amber);border:1px solid rgba(245,158,11,0.2)}

.grid-2{display:grid;grid-template-columns:1fr 320px;gap:16px}

/* map */
#map{height:280px;border-radius:8px;overflow:hidden;border:1px solid var(--border)}

/* task list */
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.task-item:last-child{border-bottom:none}
.task-check{width:20px;height:20px;border-radius:6px;border:1.5px solid var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:2px;transition:.2s;background:transparent}
.task-check:hover{border-color:var(--blue)}
.task-check.done{background:var(--green);border-color:var(--green);color:#fff}
.task-name{font-size:13px;font-weight:500}
.task-meta{font-size:11px;color:var(--text2);margin-top:3px}
.task-pri{font-size:10px;font-weight:600;padding:1px 7px;border-radius:10px;margin-left:auto;flex-shrink:0;margin-top:2px}
.pri-high{background:rgba(239,68,68,0.12);color:var(--red)}
.pri-med{background:rgba(245,158,11,0.12);color:var(--amber)}
.pri-low{background:rgba(34,197,94,0.12);color:var(--green)}

/* weather */
.wx-main{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border);margin-bottom:10px}
.wx-temp{font-size:36px;font-weight:700;font-family:'JetBrains Mono',monospace}
.wx-status{font-size:12px;color:var(--text2);margin-top:2px}
.wx-row{display:flex;justify-content:space-between;font-size:12px;padding:7px 0;border-bottom:1px solid var(--border)}
.wx-key{color:var(--text2)}
.wx-alert{padding:12px;border-radius:8px;font-size:12px;font-weight:500;margin-top:10px}

/* log */
.log-item{display:flex;gap:10px;font-size:12px;padding:8px 0;border-bottom:1px solid var(--border)}
.log-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;margin-top:4px}
.log-time{font-size:10px;color:var(--text3);margin-top:2px;font-family:'JetBrains Mono',monospace}

/* donut wrap */
.chart-wrap{height:160px;display:flex;align-items:center;justify-content:center}

/* notification banner */
.notif{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.2);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;font-size:12px}
.notif-icon{font-size:20px}
</style>
</head>
<body>

<aside>
  <div class="brand">
    <div class="brand-icon">⚓</div>
    <div>
      <div class="brand-name">FleetWatch</div>
      <div class="brand-sub">Operator Station</div>
    </div>
  </div>
  <nav id="side-nav">
    <div class="nav-section">MENU UTAMA</div>
    <a class="nav-item active" data-page="dashboard"><span class="icon">📊</span>Dashboard</a>
    <a class="nav-item" data-page="tugas"><span class="icon">✅</span>Tugas Harian<span class="nav-badge" id="task-badge">3</span></a>
    <a class="nav-item" data-page="peta"><span class="icon">🗺️</span>Peta Navigasi</a>
    <div class="nav-section">INFO</div>
    <a class="nav-item" data-page="cuaca"><span class="icon">🌊</span>Info Cuaca</a>
    <a class="nav-item" data-page="laporan"><span class="icon">📋</span>Laporan Saya</a>
  </nav>
  <div class="profile">
    <div class="avatar" id="av">A</div>
    <div>
      <div class="p-name" id="pname">Operator</div>
      <div class="p-role">Field Operator — Level 01</div>
    </div>
  </div>
</aside>

<main>
  <header>
    <div class="hdr-left">
      <h1 id="page-title">Dashboard</h1>
      <p>PT. PAL Indonesia — Surabaya</p>
    </div>
    <div class="hdr-right">
      <div class="live-pill"><span class="live-dot"></span>Live</div>
      <div class="hdr-clock" id="clock">00:00:00</div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>
  <div class="content" id="content"></div>
</main>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const workerName = localStorage.getItem('pal_name') || 'Operator';
document.getElementById('av').textContent = workerName.charAt(0).toUpperCase();
document.getElementById('pname').textContent = workerName.charAt(0).toUpperCase()+workerName.slice(1);

const tasks = [
  {id:1,name:'Engine Check — KRI Nusantara',meta:'Dok A · 08:00–10:00 WIB',pri:'high',done:false},
  {id:2,name:'Fuel Refill — MV Sinar Bahari',meta:'Dermaga 3 · 10:30–11:30 WIB',pri:'med',done:true},
  {id:3,name:'Hull Inspection — KM Cakrawala',meta:'Dok B · 13:00–14:30 WIB',pri:'med',done:false},
  {id:4,name:'Maintenance Log Update',meta:'Kantor Operasional · 15:00 WIB',pri:'low',done:false},
  {id:5,name:'Safety Briefing — Tim Alpha',meta:'Aula Utama · 16:00 WIB',pri:'low',done:true},
];

const logs = [
  {col:'#22c55e',text:'KRI Nusantara engine check selesai — status normal',time:'10:55'},
  {col:'#3b82f6',text:'Jadwal maintenance KM Cakrawala dikonfirmasi',time:'10:30'},
  {col:'#f59e0b',text:'Pengisian BBM MV Sinar Bahari selesai 98%',time:'10:15'},
  {col:'#22c55e',text:'Shift pagi dimulai — 4 operator hadir',time:'08:00'},
];

let mapInst=null;

setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('id-ID')},1000);

document.querySelectorAll('.nav-item').forEach(el=>{
  el.addEventListener('click',e=>{
    e.preventDefault();
    document.querySelectorAll('.nav-item').forEach(x=>x.classList.remove('active'));
    el.classList.add('active');
    document.getElementById('page-title').textContent = el.textContent.trim().replace(/\d+/,'').trim();
    loadPage(el.dataset.page);
  });
});

function loadPage(pg){
  if(mapInst){mapInst.remove();mapInst=null}
  const c=document.getElementById('content');
  c.innerHTML='';
  if(pg==='dashboard')pageDashboard(c);
  else if(pg==='tugas')pageTugas(c);
  else if(pg==='peta')pagePeta(c);
  else if(pg==='cuaca')pageCuaca(c);
  else if(pg==='laporan')pageLaporan(c);
}

// ── DASHBOARD ──
function pageDashboard(c){
  const done=tasks.filter(t=>t.done).length;
  c.innerHTML=`
  <div class="notif">
    <span class="notif-icon">👋</span>
    <div>Selamat datang, <b>${workerName.charAt(0).toUpperCase()+workerName.slice(1)}</b>! Kamu punya <b>${tasks.filter(t=>!t.done).length} tugas</b> yang belum diselesaikan hari ini.</div>
  </div>
  <div class="stats-row">
    <div class="stat-card sc-blue"><div class="sc-icon" style="background:rgba(59,130,246,.12)">📋</div><div class="sc-val">${tasks.length}</div><div class="sc-label">Total Tugas</div><div class="sc-badge" style="background:rgba(59,130,246,.1);color:var(--blue2)">Hari ini</div></div>
    <div class="stat-card sc-green"><div class="sc-icon" style="background:rgba(34,197,94,.12)">✅</div><div class="sc-val">${done}</div><div class="sc-label">Selesai</div><div class="sc-badge" style="background:rgba(34,197,94,.1);color:var(--green)">${Math.round(done/tasks.length*100)}%</div></div>
    <div class="stat-card sc-amber"><div class="sc-icon" style="background:rgba(245,158,11,.12)">⏳</div><div class="sc-val">${tasks.filter(t=>!t.done).length}</div><div class="sc-label">Pending</div><div class="sc-badge" style="background:rgba(245,158,11,.1);color:var(--amber)">Segera</div></div>
    <div class="stat-card sc-teal"><div class="sc-icon" style="background:rgba(6,182,212,.12)">🌊</div><div class="sc-val">AMAN</div><div class="sc-label">Kondisi Laut</div><div class="sc-badge b-green">Safe to sail</div></div>
  </div>
  <div class="grid-2">
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-h"><span class="card-title">Peta Area Operasi</span><span class="badge-sm b-blue">Real-time</span></div>
        <div id="map"></div>
      </div>
      <div class="card">
        <div class="card-h"><span class="card-title">Log Aktivitas</span></div>
        <div id="log-box"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;gap:16px">
      <div class="card">
        <div class="card-h"><span class="card-title">Progress Tugas</span></div>
        <div class="chart-wrap"><canvas id="taskChart"></canvas></div>
      </div>
      <div class="card">
        <div class="card-h"><span class="card-title">Tugas Hari Ini</span><span class="badge-sm b-amber">${tasks.filter(t=>!t.done).length} pending</span></div>
        <div id="mini-tasks"></div>
      </div>
      <div class="card" style="background:rgba(6,182,212,0.05);border-color:rgba(6,182,212,0.2)">
        <div class="card-h"><span class="card-title" style="color:var(--teal)">🌊 Info Cuaca</span></div>
        <div style="font-size:12px;display:flex;flex-direction:column;gap:7px">
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">Angin</span><span>12 knot / Barat Laut</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">Gelombang</span><span>0.5 – 1.2 m</span></div>
          <div style="display:flex;justify-content:space-between"><span style="color:var(--text2)">Visibilitas</span><span>8 km</span></div>
          <div style="margin-top:4px;padding:8px;border-radius:8px;background:rgba(34,197,94,0.1);color:var(--green);font-size:11px;font-weight:600;text-align:center">✅ AMAN BERLAYAR</div>
        </div>
      </div>
    </div>
  </div>`;
  setTimeout(()=>{
    initWorkerMap();
    renderMiniTasks();
    renderLogs();
    initTaskChart(done, tasks.length-done);
  },50);
}

function initWorkerMap(){
  mapInst=L.map('map',{zoomControl:false}).setView([-5,118],5);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInst);
  const pts=[{lat:-5.4,lng:105.2,n:'KRI Nusantara',c:'#22c55e'},{lat:-6.1,lng:106.8,n:'MV Sinar Bahari',c:'#22c55e'},{lat:-7.2,lng:112.7,n:'KM Segara Jaya',c:'#f59e0b'},{lat:-3.8,lng:128.2,n:'KRI Macan Tutul',c:'#22c55e'}];
  pts.forEach(p=>{
    const icon=L.divIcon({className:'',html:`<div style="width:12px;height:12px;background:${p.c};border-radius:50%;border:2px solid #fff;box-shadow:0 0 6px ${p.c}66"></div>`,iconSize:[12,12],iconAnchor:[6,6]});
    L.marker([p.lat,p.lng],{icon}).addTo(mapInst).bindPopup(`<b>${p.n}</b>`);
  });
}

function renderMiniTasks(){
  const b=document.getElementById('mini-tasks');if(!b)return;
  tasks.slice(0,4).forEach(t=>{
    const pc=t.pri==='high'?'pri-high':t.pri==='med'?'pri-med':'pri-low';
    const pl=t.pri==='high'?'Tinggi':t.pri==='med'?'Sedang':'Rendah';
    b.innerHTML+=`<div class="task-item"><div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id},this)">${t.done?'✓':''}</div><div style="flex:1"><div class="task-name" style="${t.done?'text-decoration:line-through;color:var(--text2)':''}">${t.name}</div><div class="task-meta">${t.meta}</div></div><div class="task-pri ${pc}">${pl}</div></div>`;
  });
}

function renderLogs(){
  const b=document.getElementById('log-box');if(!b)return;
  logs.forEach(l=>{b.innerHTML+=`<div class="log-item"><div class="log-dot" style="background:${l.col}"></div><div><div>${l.text}</div><div class="log-time">${l.time} WIB</div></div></div>`;});
}

function initTaskChart(done,pending){
  const ctx=document.getElementById('taskChart');if(!ctx)return;
  new Chart(ctx.getContext('2d'),{
    type:'doughnut',
    data:{labels:['Selesai','Pending'],datasets:[{data:[done,pending],backgroundColor:['#22c55e','rgba(245,158,11,0.4)'],borderColor:['#22c55e','#f59e0b'],borderWidth:2,hoverOffset:4}]},
    options:{cutout:'72%',plugins:{legend:{labels:{color:'#94a3b8',font:{size:11,family:'Plus Jakarta Sans'},boxWidth:10}}}}
  });
}

// ── TUGAS ──
function pageTugas(c){
  const done=tasks.filter(t=>t.done).length;
  c.innerHTML=`
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
      <div style="font-size:13px;color:var(--text2)">Progress Hari Ini</div>
      <div style="font-size:13px;font-weight:700;color:var(--green)">${done}/${tasks.length}</div>
    </div>
    <div style="height:6px;background:var(--border);border-radius:3px;overflow:hidden">
      <div style="height:100%;width:${Math.round(done/tasks.length*100)}%;background:linear-gradient(90deg,var(--blue),var(--teal));border-radius:3px;transition:width .5s ease"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-h"><span class="card-title">Daftar Tugas Harian</span><span class="badge-sm b-blue">${new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long'})}</span></div>
    <div id="full-tasks"></div>
  </div>`;
  const b=document.getElementById('full-tasks');
  tasks.forEach(t=>{
    const pc=t.pri==='high'?'pri-high':t.pri==='med'?'pri-med':'pri-low';
    const pl=t.pri==='high'?'Prioritas Tinggi':t.pri==='med'?'Prioritas Sedang':'Prioritas Rendah';
    b.innerHTML+=`<div class="task-item"><div class="task-check ${t.done?'done':''}" onclick="toggleTask(${t.id},this)">${t.done?'✓':''}</div><div style="flex:1"><div class="task-name" style="${t.done?'text-decoration:line-through;color:var(--text2)':''}">${t.name}</div><div class="task-meta">${t.meta}</div></div><div class="task-pri ${pc}">${pl}</div></div>`;
  });
}

function toggleTask(id, el){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  t.done=!t.done;
  el.classList.toggle('done',t.done);
  el.textContent=t.done?'✓':'';
  const nameEl=el.nextElementSibling?.querySelector('.task-name');
  if(nameEl)nameEl.style.cssText=t.done?'text-decoration:line-through;color:var(--text2)':'';
  const pending=tasks.filter(x=>!x.done).length;
  const badge=document.getElementById('task-badge');
  if(badge)badge.textContent=pending;
}

// ── PETA ──
function pagePeta(c){
  c.innerHTML=`
  <div class="card">
    <div class="card-h"><span class="card-title">Peta Navigasi — Area Operasi</span><span class="badge-sm b-blue">Real-time</span></div>
    <div id="map" style="height:500px;border-radius:8px;overflow:hidden;border:1px solid var(--border)"></div>
  </div>`;
  setTimeout(()=>{
    mapInst=L.map('map',{zoomControl:true}).setView([-5,118],5);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap'}).addTo(mapInst);
    const pts=[
      {lat:-5.4,lng:105.2,n:'KRI Nusantara',s:'Operasional',c:'#22c55e'},
      {lat:-6.1,lng:106.8,n:'MV Sinar Bahari',s:'Operasional',c:'#22c55e'},
      {lat:-7.2,lng:112.7,n:'KM Segara Jaya',s:'Maintenance',c:'#f59e0b'},
      {lat:-8.5,lng:115.2,n:'RV Samudra Riset',s:'Operasional',c:'#22c55e'},
      {lat:-3.8,lng:128.2,n:'KRI Macan Tutul',s:'Operasional',c:'#22c55e'},
      {lat:-0.9,lng:131.3,n:'MV Karya Bangsa',s:'Berlabuh',c:'#06b6d4'},
    ];
    pts.forEach(p=>{
      const icon=L.divIcon({className:'',html:`<div style="width:14px;height:14px;background:${p.c};border-radius:50%;border:2.5px solid #fff;box-shadow:0 0 8px ${p.c}88"></div>`,iconSize:[14,14],iconAnchor:[7,7]});
      L.marker([p.lat,p.lng],{icon}).addTo(mapInst).bindPopup(`<b>${p.n}</b><br/>Status: ${p.s}`);
    });
  },50);
}
